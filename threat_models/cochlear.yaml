name: Cochlear Implant
description: Auditory prosthesis with external sound processor.

assets:
  - id: internal_receiver
    type: implant
    description: Implanted receiver and electrode array in the cochlea.
  - id: external_processor
    type: wearable
    description: Microphone and signal processor worn behind the ear.
  - id: smartphone_streamer
    type: mobile_app
    description: App for streaming audio directly via Bluetooth.
  - id: neural_data
    type: data
    description: Patient auditory data and configurations.
  - id: credentials
    type: credential
    description: Bluetooth pairing keys and application tokens.
  - id: reputation
    type: reputation
    description: Trust in the device manufacturer.

trust_boundaries:
  - id: tb_rf_coil
    type: near_field
    components: [external_processor, internal_receiver]
    protocol: Inductive RF
  - id: tb_audio_stream
    type: wireless
    components: [smartphone_streamer, external_processor]
    protocol: Bluetooth Classic / LE Audio

entry_points:
  - component: external_processor
    interface: Bluetooth Interface
  - component: external_processor
    interface: Microphones (Acoustic)

security_assumptions:
  - The internal receiver has no computational logic, only stimulus routing.
  - The external processor is strictly limited to safe stimulation bounds in hardware.
  - Pairing requires a physical button press on the processor.

potential_attack_paths:
  - path: L1 -> tb_audio_stream -> external_processor
    severity: HIGH
    technique: Acoustic Shock / Malicious Audio Streaming
  - path: L0 -> tb_rf_coil
    severity: HIGH
    technique: Eavesdropping on unencrypted inductive link

platform_threats:
  - id: PT-001
    name: Simulation Escape
    severity: CRITICAL
    description: Attack escapes the NeuroDSL VM to compromise the researcher's host environment.
  - id: PT-002
    name: State Tampering
    severity: HIGH
    description: Attack modifies the DigitalTwin state directly, bypassing physics constraints.
  - id: PT-003
    name: Web API Unauthenticated Access
    severity: CRITICAL
    description: Attack targets the unauthenticated Web API to manipulate simulation parameters and intercept telemetry streams without authorization.
  - id: PT-004
    name: Remote Code Execution (RCE)
    severity: CRITICAL
    description: Exploitation of vulnerable dependencies or unsafe platform inputs to achieve arbitrary code execution on the simulation host.
  - id: PT-005
    name: Supply Chain Compromise
    severity: HIGH
    description: Malicious modification of the platform's dependencies (e.g. requirements.txt) leading to a compromised runtime environment.
