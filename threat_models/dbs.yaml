name: Deep Brain Stimulation (DBS)
description: Closed-loop DBS system with companion app and cloud syncing.

assets:
  - id: dbs_implant
    type: implant
    description: IPG and depth electrodes in STN.
  - id: companion_app
    type: mobile_app
    description: Patient smartphone application for therapy adjustment.
  - id: cloud_backend
    type: server
    description: Telemetry synchronization and remote monitoring.
  - id: clinician_programmer
    type: tablet
    description: Clinical tablet for adjusting stimulation parameters.
  - id: neural_data
    type: data
    description: Patient neural data at rest and in transit.
  - id: credentials
    type: credential
    description: API tokens, clinical passwords, and BLE pairing keys.
  - id: reputation
    type: reputation
    description: Trust in the device manufacturer.

trust_boundaries:
  - id: tb_body_area_network
    type: wireless
    components: [dbs_implant, companion_app, clinician_programmer]
    protocol: BLE
  - id: tb_internet
    type: network
    components: [companion_app, cloud_backend, clinician_programmer]
    protocol: HTTPS/TLS

entry_points:
  - component: dbs_implant
    interface: BLE Advertising
  - component: companion_app
    interface: Android/iOS OS APIs
  - component: cloud_backend
    interface: REST API

security_assumptions:
  - The implant requires mutual authentication for parameter changes.
  - The companion app enforces certificate pinning.
  - RF range is limited to ~2 meters.

potential_attack_paths:
  - path: L1 -> tb_body_area_network -> dbs_implant
    severity: HIGH
    technique: Protocol Replay
  - path: L2 -> companion_app -> tb_body_area_network -> dbs_implant
    severity: HIGH
    technique: Malicious Parameter Update

platform_threats:
  - id: PT-001
    name: Simulation Escape
    severity: CRITICAL
    description: Attack escapes the NeuroDSL VM to compromise the researcher's host environment.
  - id: PT-002
    name: State Tampering
    severity: HIGH
    description: Attack modifies the DigitalTwin state directly, bypassing physics constraints.
  - id: PT-003
    name: Web API Unauthenticated Access
    severity: CRITICAL
    description: Attack targets the unauthenticated Web API to manipulate simulation parameters and intercept telemetry streams without authorization.
  - id: PT-004
    name: Remote Code Execution (RCE)
    severity: CRITICAL
    description: Exploitation of vulnerable dependencies or unsafe platform inputs to achieve arbitrary code execution on the simulation host.
  - id: PT-005
    name: Supply Chain Compromise
    severity: HIGH
    description: Malicious modification of the platform's dependencies (e.g. requirements.txt) leading to a compromised runtime environment.
