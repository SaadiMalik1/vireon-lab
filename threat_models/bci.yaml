name: Brain-Computer Interface (BCI)
description: Bidirectional BCI for motor control and sensory feedback.

assets:
  - id: bci_implant
    type: implant
    description: High-density microelectrode array in motor cortex.
  - id: wearable_processor
    type: wearable
    description: External processing unit for neural decoding.
  - id: robotic_prosthesis
    type: actuator
    description: External robotic limb.
  - id: calibration_software
    type: desktop_app
    description: PC software for training decoding algorithms.
  - id: neural_data
    type: data
    description: Patient neural data at rest and in transit.
  - id: credentials
    type: credential
    description: API tokens and BLE pairing keys.
  - id: reputation
    type: reputation
    description: Trust in the device manufacturer.

trust_boundaries:
  - id: tb_transcutaneous
    type: physical_or_rf
    components: [bci_implant, wearable_processor]
    protocol: High-bandwidth RF or percutaneous connector
  - id: tb_actuator_bus
    type: wired
    components: [wearable_processor, robotic_prosthesis]
    protocol: CAN bus or Serial
  - id: tb_calibration_link
    type: network
    components: [wearable_processor, calibration_software]
    protocol: Wi-Fi / TCP

entry_points:
  - component: wearable_processor
    interface: Wi-Fi Interface
  - component: wearable_processor
    interface: Decoder Firmware Update
  - component: calibration_software
    interface: Network Port

security_assumptions:
  - The wearable processor acts as a gateway and firewall for the implant.
  - Calibration software is run on a trusted, isolated network.
  - Actuator limits are enforced locally on the robotic prosthesis.

potential_attack_paths:
  - path: L2 -> tb_calibration_link -> wearable_processor
    severity: HIGH
    technique: Decoder Model Poisoning
  - path: L5 -> wearable_processor -> tb_transcutaneous -> bci_implant
    severity: HIGH
    technique: Malicious Stimulation Injection

platform_threats:
  - id: PT-001
    name: Simulation Escape
    severity: CRITICAL
    description: Attack escapes the NeuroDSL VM to compromise the researcher's host environment.
  - id: PT-002
    name: State Tampering
    severity: HIGH
    description: Attack modifies the DigitalTwin state directly, bypassing physics constraints.
  - id: PT-003
    name: Web API Unauthenticated Access
    severity: CRITICAL
    description: Attack targets the unauthenticated Web API to manipulate simulation parameters and intercept telemetry streams without authorization.
  - id: PT-004
    name: Remote Code Execution (RCE)
    severity: CRITICAL
    description: Exploitation of vulnerable dependencies or unsafe platform inputs to achieve arbitrary code execution on the simulation host.
  - id: PT-005
    name: Supply Chain Compromise
    severity: HIGH
    description: Malicious modification of the platform's dependencies (e.g. requirements.txt) leading to a compromised runtime environment.
