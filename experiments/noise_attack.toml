# VIREON — Noise Injection Security Assessment
# Demonstrates deterministic attack replay for reproducible research.
# Run with: python -m vireon run experiments/noise_attack.toml

[experiment]
name = "noise_injection_assessment"
seed = 12345
duration_sec = 20.0
interval_sec = 0.1

[device]
type = "synthetic"
sample_rate = 250
num_channels = 8

[dataset]
loop = true

[attacks]
active = ["noise"]
target_channels = [0, 1, 2, 3]
noise_level_uv = 80.0

[security]
enabled = true
rms_high_threshold = 120.0

[output]
report_prefix = "noise_assessment"
formats = ["json", "html", "md"]

[emulation]
dbs_mode = false
