name: VIREON Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[all]

    - name: Generate synthetic attack corpus
      run: |
        python datasets/synthetic/generator.py

    - name: Run automated validation suite
      env:
        PYTHONPATH: .
      run: |
        python vireon/core/validation.py

    - name: Upload Validation Report
      uses: actions/upload-artifact@v4
      with:
        name: validation-report
        path: datasets/validation_report.json
