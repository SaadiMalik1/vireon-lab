name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install maturin
        pip install -e .[all]
        pip install ruff mypy pytest-cov pip-audit

    - name: Security Audit with pip-audit
      run: |
        pip-audit
        
    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Type check with MyPy
      run: |
        mypy vireon/

    - name: Test Python Core with pytest
      run: |
        pytest tests/ --cov=vireon --cov-report=xml --cov-report=term

    - name: Test Rust Core (neuro_dsl)
      working-directory: ./neuro_dsl/python_ext
      run: cargo test
