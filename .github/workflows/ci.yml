name: vireon-lab CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vireon-lab
        uses: actions/checkout@v4
        with:
          path: vireon-lab

      - name: Checkout Vireon runtime
        uses: actions/checkout@v4
        with:
          repository: SaadiMalik1/Vireon
          token: ${{ secrets.GITHUB_TOKEN }}
          path: vireon

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run tests
        run: |
          pip install ./vireon
          pip install -e "./vireon-lab[dev]"
          cd vireon-lab && pytest
