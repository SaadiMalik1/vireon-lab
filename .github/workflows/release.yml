name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Build Tools
        run: python -m pip install --upgrade pip build twine

      - name: Build Package
        run: python -m build

      - name: Generate Changelog
        id: changelog
        run: |
          echo "## Release ${{ github.ref_name }}" > CHANGELOG_STUB.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline >> CHANGELOG_STUB.md || echo "Initial release" >> CHANGELOG_STUB.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_STUB.md
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
